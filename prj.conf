# specific for Calobus
# --------------------
CONFIG_HEARTBEAT_MSEC=1000

# Zephyr
# ------

CONFIG_MAIN_STACK_SIZE=8192

CONFIG_GPIO=y
CONFIG_INPUT=y
CONFIG_POLL=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_RATELIMIT=n

CONFIG_PRINTK=y
CONFIG_REQUIRES_FLOAT_PRINTF=y
CONFIG_ZBUS=y

CONFIG_RTC=y

CONFIG_I2C=y
CONFIG_I2C_LOG_LEVEL_INF=y

CONFIG_SENSOR=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_PID=0x0004
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="USBD console"

CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MOUNT_MKFS=y
CONFIG_FS_LOG_LEVEL_DBG=y

CONFIG_CBPRINTF_LIBC_SUBSTS=y

CONFIG_SPI=y
#CONFIG_SPI_LOG_LEVEL_DBG=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_LOG_LEVEL_DBG=y
CONFIG_SD_LOG_LEVEL_DBG=y
CONFIG_SDHC_LOG_LEVEL_DBG=y
CONFIG_SDMMC_LOG_LEVEL_DBG=y
