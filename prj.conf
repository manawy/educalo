#
# specific for Calobus
# --------------------
CONFIG_HEARTBEAT_MSEC=250
CONFIG_OVERSAMPLING=10

CONFIG_SDLOGGING=y

# Zephyr
# ======

CONFIG_CPP=y
CONFIG_STD_CPP23=y
CONFIG_REQUIRES_FULL_LIBCPP=y
#CONFIG_EXTERNAL_LIBC=y
#CONFIG_GLIBCXX_LIBCPP=y

# CONFIG_DEBUG=y

# kernel
# ------
CONFIG_MAIN_STACK_SIZE=8192
# for MCUMGR
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304

# Hardware
# --------

CONFIG_GPIO=y
CONFIG_INPUT=y
CONFIG_POLL=y
CONFIG_RTC=y

CONFIG_SENSOR=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Filesystem
# ----------

CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y

CONFIG_FILE_SYSTEM=y
#CONFIG_FAT_FILESYSTEM_ELM=y
#CONFIG_FS_FATFS_MOUNT_MKFS=y
#CONFIG_FS_FATFS_EXFAT=y

CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LITTLEFS_BLK_DEV=y
CONFIG_FS_LITTLEFS_FMP_DEV=n
CONFIG_FS_LITTLEFS_FC_HEAP_SIZE=2048
CONFIG_FS_LITTLEFS_CACHE_SIZE=512

# ZBUS
# ----

CONFIG_ZBUS=y

# Shell
# -----

CONFIG_SHELL=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_RTC_SHELL=y

# MCUmgr
# ------

CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_STATS=y
CONFIG_BASE64=y
CONFIG_MCUMGR_GRP_IMG=n
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y
CONFIG_MCUMGR_GRP_STAT=n
CONFIG_MCUMGR_GRP_OS_TASKSTAT=n
CONFIG_MCUMGR_GRP_FS=y
CONFIG_MCUMGR_GRP_SHELL=y
CONFIG_MCUMGR_TRANSPORT_SHELL=y
CONFIG_SHELL_BACKEND_DUMMY=y
## this might or might not be a good thing....
CONFIG_MCUMGR_TRANSPORT_SHELL_MTU=2046
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2048

# Log and Print
# -------------

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_RATELIMIT=n

CONFIG_PRINTK=y
CONFIG_REQUIRES_FLOAT_PRINTF=y
CONFIG_CBPRINTF_LIBC_SUBSTS=y
CONFIG_CBPRINTF_FP_SUPPORT=y

